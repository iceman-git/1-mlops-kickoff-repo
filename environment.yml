name: mlops

channels:
  - conda-forge
  - defaults

dependencies:
  - python>=3.9
  - pandas
  - numpy
  - scikit-learn
  - matplotlib
  - joblib
  - jupyter
  - ipykernel
  - pytest
  - pytest-cov
  - pyyaml
  - python-dotenv
  - pip
  - pip:
    - wandb
    - fastapi
    - uvicorn[standard]
    - pydantic