name: CI

on:
  pull_request:
    branches:
      - main
      - dev

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: |
          pip install pandas numpy scikit-learn joblib pyyaml python-dotenv \
                      wandb fastapi uvicorn pydantic pytest pytest-cov

      - name: Run tests
        run: pytest tests/ -v --tb=short