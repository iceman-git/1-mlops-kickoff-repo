data:
  raw_path: "data/raw/titanic.csv"
  processed_path: "data/processed/titanic_clean.csv"
  file_type: "csv"

schema:
  target: "Survived"
  required_columns:
    - PassengerId
    - Survived
    - Pclass
    - Name
    - Sex
    - Age
    - SibSp
    - Parch
    - Ticket
    - Fare
    - Cabin
    - Embarked

logging:
  level: "INFO"
  log_file: "reports/pipeline.log"