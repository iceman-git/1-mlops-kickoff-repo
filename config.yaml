# =============================================================================
# config.yaml — Single source of truth for all non-secret runtime settings.
#
# Rules:
#   - All non-secret runtime settings live here.
#   - Secrets (WANDB_API_KEY, WANDB_ENTITY, MODEL_SOURCE, WANDB_MODEL_ALIAS)
#     live in .env only and are NEVER committed.
#   - Code-level constants (endpoint strings, log format) may stay in code.
# =============================================================================

# ── File paths ────────────────────────────────────────────────────────────────
data:
  raw_path: "data/raw/titanic.csv"
  processed_path: "data/processed/clean.csv"
  inference_path: "data/inference/titanic_infer.csv"
  file_type: "csv"

# ── Schema / problem definition ───────────────────────────────────────────────
schema:
  target: "Survived"
  id_column: "PassengerId"
  required_columns:
    - PassengerId
    - Survived
    - Pclass
    - Name
    - Sex
    - Age
    - SibSp
    - Parch
    - Ticket
    - Fare
    - Cabin
    - Embarked

# ── Train / test split ────────────────────────────────────────────────────────
split:
  test_size: 0.25
  random_state: 42
  stratify: true

# ── Training ──────────────────────────────────────────────────────────────────
training:
  problem_type: "classification"
  model_name: "logistic_regression"
  random_state: 42
  calibration: false        # set to true to wrap model in CalibratedClassifierCV

# ── Feature engineering ───────────────────────────────────────────────────────
features:
  quantile_bin: []          # numeric columns to discretize into quantile bins
  binary_sum_cols: []       # columns to sum into a single binary indicator
  categorical_onehot:
    - "Sex"
    - "Embarked"
  numeric_passthrough:
    - "Pclass"
    - "Age"
    - "SibSp"
    - "Parch"
    - "Fare"
  n_bins: 3

# ── Validation rules ──────────────────────────────────────────────────────────
validation:
  non_negative_cols: []     # columns whose values must be >= 0

# ── Evaluation ────────────────────────────────────────────────────────────────
evaluation:
  primary_metric: "f1"
  save_reports: false
  report_path: "reports/metrics.json"

# ── Inference ─────────────────────────────────────────────────────────────────
inference:
  predictions_output: "reports/predictions.csv"
  top_n: 5                  # number of example rows to run through batch inference

# ── Model artifact (local fallback path) ──────────────────────────────────────
artifacts:
  model_path: "models/model.joblib"

# ── Logging ───────────────────────────────────────────────────────────────────
logging:
  level: "INFO"
  log_file: "logs/pipeline.log"

# ── Weights & Biases ──────────────────────────────────────────────────────────
wandb:
  project: "titanic-survival-prediction"
  artifact_name: "titanic_survival_model"
  artifact_type: "model"
  artifact_alias: "prod"
